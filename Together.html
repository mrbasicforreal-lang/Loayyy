<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonight Restaurant - Customize Together Box</title>
    <style>
        /* Modern Premium Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 1;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.5rem;
        }

        header p {
            color: #a9a9a9;
            font-size: 1rem;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1rem;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #d4af37;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #d4af37;
            color: #0b0b0b;
        }

        /* Box Blueprint Container */
        .box-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        /* The background base box image */
        .box-base-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            border: 2px solid #2a2515;
        }

        /* Hotspot Button Overlays */
        .hotspot {
            position: absolute;
            background: rgba(212, 175, 55, 0.03);
            border: 1px dashed rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            cursor: pointer;
            padding: 5px;
        }

        .hotspot:hover {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* Fixed Items Styles (Non-clickable visual tags) */
        .hotspot.fixed {
            cursor: default;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hotspot.fixed:hover {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .hotspot-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .hotspot-val {
            font-size: 0.85rem;
            font-weight: 600;
            color: #d4af37;
        }
        .hotspot.fixed .hotspot-val {
            color: #aaa;
        }

        /* Exact Layout Percentage Blueprint Plots */
        .hs-cutlery { top: 3.5%;  left: 3.5%;  width: 93%;   height: 12%; }
        .hs-drink   { top: 18.5%; left: 3.5%;  width: 55.5%; height: 16%; }
        .hs-cookies { top: 18.5%; left: 61.5%; width: 35%;   height: 16%; }
        .hs-popcorn { top: 37.5%; left: 3.5%;  width: 55.5%; height: 32%; }
        .hs-bread   { top: 37.5%; left: 61.5%; width: 35%;   height: 32%; }
        .hs-pancake { top: 72.5%; left: 3.5%;  width: 27%;   height: 24%; border-radius: 50%; }
        .hs-sauce   { top: 72.5%; left: 33%;   width: 26%;   height: 24%; }
        .hs-snacks  { top: 72.5%; left: 61.5%; width: 35%;   height: 24%; }

        /* Popups Styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #141414;
            border: 2px solid #d4af37;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(212,175,55,0.2);
        }

        .modal-content h3 {
            color: #d4af37;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            text-transform: uppercase;
            border-bottom: 1px solid #2a2515;
            padding-bottom: 0.5rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .option-item {
            background: #1c1c1c;
            border: 1px solid #333;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            border-color: #d4af37;
            background: #221f16;
        }

        .option-item.selected {
            border-color: #d4af37;
            background: #d4af37;
            color: #0b0b0b;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            border: none;
        }

        .btn-cancel { background: #333; color: #fff; }
        .btn-confirm { background: #d4af37; color: #0b0b0b; }

        .btn-submit {
            background: linear-gradient(135deg, #d4af37, #aa841c);
            color: #0b0b0b;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 600px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>Tonight Box - Together</h1>
        <p>Click on the customizable slots inside the box to choose your menu options</p>
        <a href="/workspaces/Loayyy/index.html" class="back-btn">← Change Box Size</a>
    </header>

    <!-- Visual Layer Stack Container -->
    <div class="box-container">
        <!-- REPLACE THIS WITH YOUR EMPTY LOGO BOX IMAGE PATH -->
        <img src="/workspaces/Loayyy/download (8).jpg" alt="Together Box Frame" class="box-base-img">

        <!-- Red Circle Area (Fixed) -->
        <div class="hotspot fixed hs-cutlery">
            <span class="hotspot-title">Kit</span>
            <span class="hotspot-val">Cutlery Set</span>
        </div>

        <!-- Purple Circle Area (Interactive) -->
        <div class="hotspot hs-drink" onclick="openModal('drink')">
            <span class="hotspot-title">Drink</span>
            <span class="hotspot-val" id="lbl-drink">Select Drink</span>
        </div>

        <!-- Blue Circle Area (Fixed) -->
        <div class="hotspot fixed hs-cookies">
            <span class="hotspot-title">Cookies</span>
            <span class="hotspot-val">Included</span>
        </div>

        <!-- Green Circle Area (Fixed) -->
        <div class="hotspot fixed hs-popcorn">
            <span class="hotspot-title">Popcorn</span>
            <span class="hotspot-val">Included</span>
        </div>

        <!-- White Circle Area (Interactive) -->
        <div class="hotspot hs-bread" onclick="openModal('bread')">
            <span class="hotspot-title">Bread</span>
            <span class="hotspot-val" id="lbl-bread">None Selected</span>
        </div>

        <!-- Circle Shape Bottom Left (Interactive) -->
        <div class="hotspot hs-pancake" onclick="openModal('pancakes')">
            <span class="hotspot-title">Pancakes</span>
            <span class="hotspot-val" id="lbl-pancakes">None</span>
        </div>

        <!-- Square Shape Bottom Center (Interactive) -->
        <div class="hotspot hs-sauce" onclick="openModal('sauce')">
            <span class="hotspot-title">Sauces</span>
            <span class="hotspot-val" id="lbl-sauce">Select Sauce</span>
        </div>

        <!-- Yellow Circle Area (Interactive) -->
        <div class="hotspot hs-snacks" onclick="openModal('snacks')">
            <span class="hotspot-title">Snacks</span>
            <span class="hotspot-val" id="lbl-snacks">None Selected</span>
        </div>
    </div>

    <button class="btn-submit" onclick="submitBoxOrder()">Confirm Custom Box</button>

    <!-- Modal Selection Overlay Box -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3 id="modalTitle">Select Option</h3>
            <div class="options-list" id="optionsContainer"></div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-confirm" onclick="confirmSelection()">Confirm</button>

                            </div>
        </div>
    </div>

    <script>
        const menuOptions = {
            drink: { title: "Select Drink", items: [" 2 - Coca-Cola Zero", " 2 - Coca-Cola Classic", " 2 - Sprite", "Water - Free"] },
            bread: { title: "Select Bread (Optional)", items: ["No Bread - Skip", " 2 - Signature Brioche Bun", " 2 - Sesame Savory Pies"] },
            pancakes: { title: "Pancake Tray (Optional)", items: ["No Pancakes - Skip", " 2 pieces - Classic Honey Pancakes", " 2 pieces - Chocolate Drizzle Pancakes"] },
            sauce: { title: "Select Sauce", items: [" 2 - Signature Chocolate Dip", " 2 - Sweet Chili Sauce", " 2 - Melted Cheddar Cheese"] },
            snacks: { title: "Select Snacks (Optional)", items: ["No Extra Snacks - Skip", " 2 packs - Tonight Potato Chips", " 2 packs - Jelly Gummy Bears"] }
        };

        let currentSlot = '';
        let tempSelection = '';
        const userSelections = { drink: "Select Drink", bread: "None Selected", pancakes: "None", sauce: "Select Sauce", snacks: "None Selected" };

        function openModal(slot) {
            currentSlot = slot;
            const data = menuOptions[slot];
            document.getElementById('modalTitle').innerText = data.title;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'option-item';
                if(userSelections[slot] === item) div.classList.add('selected');
                div.innerText = item;
                div.onclick = () => {
                    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    tempSelection = item;
                };
                container.appendChild(div);
            });
            tempSelection = userSelections[slot];
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function confirmSelection() {
            if(tempSelection) {
                userSelections[currentSlot] = tempSelection;
                document.getElementById(`lbl-${currentSlot}`).innerText = tempSelection;
            }
            closeModal();
        }

        function submitBoxOrder() {
            if(userSelections.drink.includes("Select") || userSelections.sauce.includes("Select")) {
                alert("Please pick your required Drink and Sauce options first!");
                return;
            }
            alert("Custom Box Added to Cart!");
        }

    </script>
</body>
</html>
